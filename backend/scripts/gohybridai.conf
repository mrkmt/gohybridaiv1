# ============================================================================
# GoHybridAI — Nginx Reverse Proxy Configuration
# ============================================================================
# Install:
#   sudo cp gohybridai.conf /etc/nginx/sites-available/gohybridai
#   sudo ln -sf /etc/nginx/sites-available/gohybridai /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# For SSL:
#   sudo certbot --nginx -d your-domain.com
# ============================================================================

# ---- HTTP → HTTPS redirect (uncomment when SSL is enabled) ----
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    server_name your-domain.com;

    # ----------------------------------------------------------------
    # Frontend — serve static files from Vite build output
    # ----------------------------------------------------------------
    root /opt/gohybridai/frontend/kb-ui/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ----------------------------------------------------------------
    # Backend API — proxy to Node.js on port 3000
    # ----------------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large uploads (Jira attachments)
        client_max_body_size 50m;

        # Long timeouts for test execution
        proxy_connect_timeout 75s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ----------------------------------------------------------------
    # WebSocket — persistent connection for real-time updates
    # ----------------------------------------------------------------
    location /ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket upgrade headers (CRITICAL)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep alive for long-running test sessions
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ----------------------------------------------------------------
    # Storage — serve uploaded files / local_storage via backend
    # ----------------------------------------------------------------
    location /storage/ {
        proxy_pass http://127.0.0.1:3000/storage/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache storage files
        expires 1h;
        add_header Cache-Control "public";
    }

    # ----------------------------------------------------------------
    # Health check endpoint (can restrict to internal IPs)
    # ----------------------------------------------------------------
    location = /api/health {
        proxy_pass http://127.0.0.1:3000/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Allow monitoring tools to poll this
        access_log off;
    }

    # ----------------------------------------------------------------
    # Security headers
    # ----------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self';" always;

    # Hide nginx version
    server_tokens off;
}

